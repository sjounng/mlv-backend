server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: maribel-backend
  # 로컬 개발용 비밀값(.env)을 properties 형식으로 읽는다. 파일이 없으면 무시(optional).
  config:
    import: optional:file:.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/maribel}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    username: ${DATABASE_USERNAME:maribel}
    password: ${DATABASE_PASSWORD:}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  # 스키마는 Flyway 마이그레이션(db/migration)으로 관리한다.
  # 기존 DB(하이버네이트 update 로 생성)는 baseline-on-migrate 로 V1 을 건너뛰고 합류한다.
  flyway:
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  show-actuator: false

scalar:
  enabled: true
  path: /scalar
  url: /v3/api-docs
  theme: deepSpace
  layout: modern
  dark-mode: true
  hide-search: false
  document-download-type: both
  operation-title-source: summary
  tag-sorter: alpha
  search-hot-key: k

maribel:
  # 운영 환경에서는 반드시 false 로 설정한다 (MARIBEL_DEV_LOGIN_ENABLED=false).
  dev-login-enabled: ${MARIBEL_DEV_LOGIN_ENABLED:true}
  upload:
    dir: ${MARIBEL_UPLOAD_DIR:./uploads}
    public-base-url: ${MARIBEL_UPLOAD_PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    issuer: maribel-backend
    secret: ${MARIBEL_JWT_SECRET:dev-only-change-this-secret-before-production-please}
    access-token-ttl: PT15M
    member-refresh-token-ttl: P14D
    admin-refresh-token-ttl: PT12H
    refresh-cookie-name: maribel_refresh
    refresh-cookie-path: /api/auth
    refresh-cookie-secure: ${MARIBEL_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: Lax
  cors:
    allowed-origins: ${MARIBEL_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  server-status:
    status: ${MARIBEL_SERVER_STATUS:OPEN}
    message: ${MARIBEL_SERVER_STATUS_MESSAGE:마리벨 서버가 열려 있습니다.}
    online-players: ${MARIBEL_ONLINE_PLAYERS:0}
  webpanel:
    api-key: ${MARIBEL_WEBPANEL_API_KEY:dev-webpanel-key-change-me}
  microsoft:
    client-id: ${MICROSOFT_CLIENT_ID:}
    client-secret: ${MICROSOFT_CLIENT_SECRET:}
    tenant: ${MICROSOFT_TENANT:consumers}
    redirect-uri: ${MICROSOFT_REDIRECT_URI:http://localhost:8080/api/auth/microsoft/callback}
    scopes: ${MICROSOFT_SCOPES:XboxLive.signin offline_access openid email}
    success-redirect-uri: ${MICROSOFT_SUCCESS_REDIRECT_URI:http://localhost:3000/auth/callback}
    failure-redirect-uri: ${MICROSOFT_FAILURE_REDIRECT_URI:http://localhost:3000/login}
  stella:
    merchant-id: ${STELLA_MERCHANT_ID:}
    webhook-secret: ${STELLA_WEBHOOK_SECRET:dev-stella-secret-change-me}
    payment-base-url: ${STELLA_PAYMENT_BASE_URL:https://stella.example.invalid/pay}
    # 운영 환경에서는 반드시 false 로 설정한다 (STELLA_ALLOW_UNSIGNED_WEBHOOK=false).
    allow-unsigned-webhook: ${STELLA_ALLOW_UNSIGNED_WEBHOOK:true}
  bootstrap-admin:
    username: ${MARIBEL_BOOTSTRAP_ADMIN_USERNAME:admin}
    password: ${MARIBEL_BOOTSTRAP_ADMIN_PASSWORD:change-me-now}
