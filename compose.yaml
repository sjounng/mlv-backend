# 로컬 개발용 인프라 (PostgreSQL + Redis). 앱은 ./gradlew bootRun 으로 따로 띄운다.
#   docker compose up -d
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: maribel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maribel_dev_password}
      POSTGRES_DB: maribel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
